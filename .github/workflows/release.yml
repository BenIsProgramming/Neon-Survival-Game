name: Compile and Release Cross-Platform Executables

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-web:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Enable Windows Desktop Build
      run: flutter config --enable-windows-desktop

    - name: Build Web Version
      run: flutter build web --release --no-wasm-dry-run

    - name: Build Windows Version
      run: flutter build windows

    - name: Package Web Build
      shell: pwsh
      run: Compress-Archive -Path build/web/* -DestinationPath neon-survival-web.zip

    - name: Package Windows Build
      shell: pwsh
      run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath neon-survival-windows.zip

    - name: Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: neon-survival-web.zip

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: neon-survival-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Enable Linux Desktop Build
      run: flutter config --enable-linux-desktop

    - name: Build Linux Version
      run: flutter build linux

    - name: Package Linux Build
      run: |
        cd build/linux/x64/release/bundle/
        zip -r ../../../../../neon-survival-linux.zip *

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: neon-survival-linux.zip

  create-release:
    needs: [build-windows-web, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download Web Artifact
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: ./

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: ./

    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: linux-build
        path: ./

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          neon-survival-web.zip
          neon-survival-windows.zip
          neon-survival-linux.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
