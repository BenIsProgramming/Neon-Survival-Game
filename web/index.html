<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sleek retro-synth arcade action.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="neon_survival">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Neon Survival</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      background-color: #04060C;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      font-family: monospace;
    }
    
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .loader-logo {
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 5px;
      color: #06B6D4;
      text-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
      margin-bottom: 24px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    
    .spinner {
      width: 36px;
      height: 36px;
      border: 3.5px solid rgba(6, 182, 212, 0.1);
      border-top: 3.5px solid #06B6D4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.25);
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1.0; }
    }
  </style>

  <script>
    // Synthesis audio engine for retro-arcade sound effects using Web Audio API
    var audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playLaser(vol) {
      try {
        initAudio();
        var ctx = audioCtx;
        var osc = ctx.createOscillator();
        var gainNode = ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(820, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.15);

        gainNode.gain.setValueAtTime(vol * 0.14, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.15);

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } catch(e) { console.error(e); }
    }

    function playEnemyLaser(vol) {
      try {
        initAudio();
        var ctx = audioCtx;
        var osc = ctx.createOscillator();
        var gainNode = ctx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(620, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + 0.12);

        gainNode.gain.setValueAtTime(vol * 0.08, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.12);

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.12);
      } catch(e) { console.error(e); }
    }

    function playExplosion(vol) {
      try {
        initAudio();
        var ctx = audioCtx;
        
        // Generate white noise explosion sample buffer
        var bufferSize = ctx.sampleRate * 0.32;
        var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        var data = buffer.getChannelData(0);
        for (var i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        var noise = ctx.createBufferSource();
        noise.buffer = buffer;

        var filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(750, ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(75, ctx.currentTime + 0.28);

        var gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(vol * 0.32, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);

        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(ctx.destination);

        noise.start();
        noise.stop(ctx.currentTime + 0.28);
      } catch(e) { console.error(e); }
    }

    function playHit(vol) {
      try {
        initAudio();
        var ctx = audioCtx;
        var osc = ctx.createOscillator();
        var gainNode = ctx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(380, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.09);

        gainNode.gain.setValueAtTime(vol * 0.24, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.09);

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.09);
      } catch(e) { console.error(e); }
    }

    function playPowerUp(vol) {
      try {
        initAudio();
        var ctx = audioCtx;
        var now = ctx.currentTime;
        var notes = [261.63, 329.63, 392.00, 523.25]; // C4 -> E4 -> G4 -> C5 arpeggio

        notes.forEach(function(freq, idx) {
          var osc = ctx.createOscillator();
          var gainNode = ctx.createGain();
          
          osc.type = 'sine';
          osc.frequency.value = freq;
          
          var noteStart = now + (idx * 0.075);
          var dur = 0.11;
          
          gainNode.gain.setValueAtTime(0.0, now);
          gainNode.gain.setValueAtTime(vol * 0.12, noteStart);
          gainNode.gain.exponentialRampToValueAtTime(0.001, noteStart + dur);
          
          osc.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          osc.start(noteStart);
          osc.stop(noteStart + dur);
        });
      } catch(e) { console.error(e); }
    }

    function playGameOver(vol) {
      try {
        initAudio();
        var ctx = audioCtx;
        var osc = ctx.createOscillator();
        var gainNode = ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(240, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(30, ctx.currentTime + 0.75);

        gainNode.gain.setValueAtTime(vol * 0.2, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.75);

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.75);
      } catch(e) { console.error(e); }
    }
  </script>
</head>
<body>
  <div class="loader-container" id="loading-indicator">
    <div class="loader-logo">NEON SURVIVAL</div>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
